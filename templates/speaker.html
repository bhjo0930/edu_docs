<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- CUSTOMIZE: 강의 제목 -->
<title>강사 화면 — 강의 제목</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #top-bar {
    height: 44px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
    flex-shrink: 0;
  }

  #top-bar .label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }

  #top-bar .sep { color: #2a2a2a; }

  #top-bar .slide-info {
    font-size: 12px;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #top-bar .slide-info strong { color: #ccc; }

  #timer-wrap { display: flex; align-items: center; gap: 8px; }

  #timer {
    font-size: 18px;
    font-weight: 700;
    color: #f59e0b;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    min-width: 56px;
  }

  .timer-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .timer-btn:hover { color: #aaa; }

  #content { flex: 1; display: flex; overflow: hidden; }

  #slide-view {
    flex: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-width: 0;
  }

  #slide-frame-wrap {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.7);
    border: 1px solid #2a2a2a;
  }

  #slide-frame { width: 100%; height: 100%; border: none; display: block; }

  #right-panel {
    width: 340px;
    min-width: 300px;
    background: #0d0d0d;
    border-left: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  #next-section {
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  #next-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  #next-card .n-idx { font-size: 11px; color: #444; font-weight: 700; padding-top: 1px; min-width: 24px; }
  #next-card .n-section { font-size: 10px; color: #555; margin-bottom: 2px; }
  #next-card .n-title { font-size: 13px; font-weight: 600; color: #999; line-height: 1.4; word-break: keep-all; }

  #notes-section { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

  .notes-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 16px;
    overflow: hidden;
    border-bottom: 1px solid #181818;
    min-height: 0;
  }
  .notes-block:last-child { border-bottom: none; }

  .notes-block-label {
    font-size: 10px;
    font-weight: 700;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .notes-block-label::after { content: ''; flex: 1; height: 1px; background: #1e1e1e; }

  .notes-content {
    font-size: 13px;
    color: #aaa;
    line-height: 1.8;
    word-break: keep-all;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .notes-content::-webkit-scrollbar { width: 4px; }
  .notes-content::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  .notes-content strong { color: #e0e0e0; font-weight: 600; }

  #bottom-bar {
    height: 52px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    padding: 7px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .nav-btn:hover { background: #252525; color: #f0f0f0; border-color: #444; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn.primary { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .nav-btn.primary:hover { background: #fbbf24; }
  .nav-btn.primary:disabled { background: #1a1a1a; border-color: #2a2a2a; color: #999; }

  #progress-wrap { flex: 1; height: 3px; background: #1e1e1e; border-radius: 2px; overflow: hidden; }
  #progress-bar { height: 100%; background: #f59e0b; border-radius: 2px; transition: width 0.3s; width: 0%; }

  #counter { font-size: 12px; color: #444; font-variant-numeric: tabular-nums; white-space: nowrap; }

  #sync-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: #333; white-space: nowrap; }
  #sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #22c55e; }

  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  #sync-dot.syncing { animation: blink 0.5s 3; }
</style>
</head>
<body>

<div id="top-bar">
  <span class="label">강사 화면</span>
  <span class="sep">|</span>
  <span class="slide-info" id="header-info"><strong>—</strong></span>
  <div id="timer-wrap">
    <button class="timer-btn" id="btn-pause" title="일시정지">⏸</button>
    <button class="timer-btn" id="btn-reset" title="리셋">↺</button>
    <span id="timer">00:00</span>
  </div>
</div>

<div id="content">
  <div id="slide-view">
    <div id="slide-frame-wrap">
      <!-- slides.html 상대 경로 — 폴더 복사 시 자동 연결 -->
      <iframe id="slide-frame" src="slides.html?embed=1" title="슬라이드"></iframe>
    </div>
  </div>

  <div id="right-panel">
    <div id="next-section">
      <div class="section-label">다음 슬라이드</div>
      <div id="next-card">
        <div class="n-idx" id="next-idx">—</div>
        <div class="n-body">
          <div class="n-section" id="next-section-name">—</div>
          <div class="n-title" id="next-title">마지막 슬라이드입니다</div>
        </div>
      </div>
    </div>

    <div id="notes-section">
      <div class="notes-block">
        <div class="notes-block-label">요약</div>
        <div class="notes-content" id="notes-summary">—</div>
      </div>
      <div class="notes-block">
        <div class="notes-block-label">스크립트</div>
        <div class="notes-content" id="notes-script">—</div>
      </div>
    </div>
  </div>
</div>

<!-- CUSTOMIZE: 슬라이드 수가 바뀌면 카운터 숫자 업데이트 -->
<div id="bottom-bar">
  <button class="nav-btn" id="btn-prev">← 이전</button>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <span id="counter">1 / 18</span>
  <button class="nav-btn primary" id="btn-next">다음 →</button>
  <div id="sync-status"><div id="sync-dot"></div><span>동기화</span></div>
</div>

<script>
// CUSTOMIZE: slides 배열 — slides.html의 슬라이드 순서와 동일하게 유지
const slides = [
  { title: '강의 제목', section: '표지' },
  { title: '전체 흐름', section: '목차' },
  { title: '1부: 1부 제목', section: '섹션', isDivider: true },
  { title: '1부 슬라이드 A 제목', section: '1부' },
  { title: '1부 슬라이드 B 제목', section: '1부' },
  { title: '2부: 2부 제목', section: '섹션', isDivider: true },
  { title: '2부 슬라이드 A 제목', section: '2부' },
  { title: '2부 슬라이드 B 제목', section: '2부' },
  { title: '3부: 3부 제목', section: '섹션', isDivider: true },
  { title: '3부 슬라이드 A 제목', section: '3부' },
  { title: '3부 슬라이드 B 제목', section: '3부' },
  { title: '4부: 4부 제목', section: '섹션', isDivider: true },
  { title: '4부 슬라이드 A 제목', section: '4부' },
  { title: '4부 슬라이드 B 제목', section: '4부' },
  { title: '5부: 5부 제목', section: '섹션', isDivider: true },
  { title: '5부 슬라이드 A 제목', section: '5부' },
  { title: '5부 슬라이드 B 제목', section: '5부' },
  { title: '마무리', section: '마무리' },
];

const total = slides.length;

// CUSTOMIZE: notesData — 각 슬라이드 요약과 강사 스크립트 작성
const notesData = [
  {
    summary: "강의 시작. 오늘 다룰 5개 파트 소개. 수강생 배경 및 기대 수준 확인.",
    script: "안녕하세요, [강의 제목]에 오신 것을 환영합니다.\n\n오늘 목표는 하나입니다. 강의가 끝날 때 '내일 바로 써볼 것' 하나를 정해 가져가는 것입니다.\n\n총 5개 파트로 진행합니다. 각 파트 설명을 여기에 추가하세요."
  },
  {
    summary: "5파트 전체 흐름 소개. 각 파트에서 다룰 핵심 주제 요약.",
    script: "전체 흐름을 먼저 보겠습니다.\n\n1부에서는 [주제]를, 2부에서는 [주제]를 다룹니다. 3부는 [주제], 4부는 [주제], 5부는 [주제]입니다.\n\n각 파트에 실습이 포함되어 있으니 바로 따라 해보세요."
  },
  {
    summary: "1부 시작. 이 파트에서 다룰 내용과 학습 목표.",
    script: "1부를 시작합니다.\n\n[1부 내용과 왜 중요한지를 여기에 씁니다.]"
  },
  {
    summary: "슬라이드 A 핵심 요약. 2-3줄로 이 슬라이드의 핵심 포인트.",
    script: "슬라이드 A 스크립트를 여기에 작성합니다.\n\n[강사가 말할 내용을 자연스러운 구어체로 씁니다. 예시, 비유, 질문을 활용하면 좋습니다.]"
  },
  {
    summary: "슬라이드 B 핵심 요약. 이 슬라이드에서 수강생이 기억해야 할 것.",
    script: "슬라이드 B 스크립트를 여기에 작성합니다.\n\n[각 Step을 설명할 때 왜 이 순서인지를 함께 설명하면 이해가 빠릅니다.]"
  },
  {
    summary: "2부 시작. 이 파트에서 다룰 내용과 학습 목표.",
    script: "2부를 시작합니다.\n\n[2부 내용 소개]"
  },
  {
    summary: "슬라이드 A 핵심 요약.",
    script: "슬라이드 A 스크립트."
  },
  {
    summary: "슬라이드 B 핵심 요약. 코드 블록 설명 포인트.",
    script: "슬라이드 B 스크립트.\n\n[코드를 설명할 때는 전체를 한 번에 읽지 말고, 한 줄씩 무엇을 하는지 설명하세요.]"
  },
  {
    summary: "3부 시작.",
    script: "3부를 시작합니다."
  },
  {
    summary: "슬라이드 A 핵심 요약. 수치의 출처와 맥락 설명.",
    script: "슬라이드 A 스크립트.\n\n[수치를 발표할 때는 단순히 읽지 말고 '이 숫자가 의미하는 것은...'으로 해석을 함께 제공하세요.]"
  },
  {
    summary: "슬라이드 B 핵심 요약. 4단계 전략의 연결 고리.",
    script: "슬라이드 B 스크립트."
  },
  {
    summary: "4부 시작.",
    script: "4부를 시작합니다."
  },
  {
    summary: "슬라이드 A 핵심 요약. 실행 흐름의 핵심 포인트.",
    script: "슬라이드 A 스크립트."
  },
  {
    summary: "슬라이드 B 핵심 요약. 두 방법의 비교와 추천 근거.",
    script: "슬라이드 B 스크립트.\n\n[비교 슬라이드에서는 '어느 게 더 좋다'보다 '언제 어느 것을 쓰면 좋다'는 맥락을 제공하세요.]"
  },
  {
    summary: "5부 시작.",
    script: "5부를 시작합니다. 오늘 강의의 마무리 파트입니다."
  },
  {
    summary: "슬라이드 A 핵심 요약. 실전 가이드 3단계.",
    script: "슬라이드 A 스크립트."
  },
  {
    summary: "슬라이드 B 핵심 요약. 오늘 강의 전체 핵심 정리.",
    script: "슬라이드 B 스크립트.\n\n[마지막 정리 슬라이드에서는 오늘 강의에서 가장 중요한 것 하나를 강조하며 마무리합니다.]"
  },
  {
    summary: "마무리. 오늘 배운 것 중 하나를 내일 바로 적용해보기 권장.",
    script: "오늘 강의를 마무리합니다.\n\n[강의 전체 핵심 메시지를 다시 한번 강조합니다.]\n\n딱 하나만 골라서 내일 바로 써보세요. 거창하지 않아도 됩니다.\n\n질문이 있으신 분은 편하게 말씀해 주세요."
  }
];

let current = 0;

function updateUI() {
  const s = slides[current];
  const note = notesData[current] || {};
  const next = slides[current + 1];

  document.getElementById('header-info').innerHTML =
    `<strong>${String(current + 1).padStart(2,'0')} / ${total}</strong> — ${s.title} <span style="color:#555">(${s.section})</span>`;

  if (next) {
    document.getElementById('next-idx').textContent = String(current + 2).padStart(2,'0');
    document.getElementById('next-section-name').textContent = next.section;
    document.getElementById('next-title').textContent = next.title;
  } else {
    document.getElementById('next-idx').textContent = '—';
    document.getElementById('next-section-name').textContent = '';
    document.getElementById('next-title').textContent = '마지막 슬라이드입니다';
  }

  document.getElementById('notes-summary').innerHTML = note.summary || '';
  document.getElementById('notes-script').innerHTML = note.script || '';
  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
}

function goTo(idx, broadcast = true) {
  if (idx < 0 || idx >= total) return;
  current = idx;
  updateUI();
  if (broadcast) {
    const frame = document.getElementById('slide-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'cc_goto', idx }, '*');
    }
    try { localStorage.setItem('cc_pres_slide', idx); } catch(e) {}
    const dot = document.getElementById('sync-dot');
    dot.classList.remove('syncing');
    void dot.offsetWidth;
    dot.classList.add('syncing');
  }
}

window.addEventListener('storage', e => {
  if (e.key === 'cc_pres_slide') {
    const idx = parseInt(e.newValue);
    if (!isNaN(idx) && idx !== current) goTo(idx, false);
  }
});

document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

let timerSec = 0, timerRunning = true;
const timerEl = document.getElementById('timer');

setInterval(() => {
  if (!timerRunning) return;
  timerSec++;
  const m = String(Math.floor(timerSec / 60)).padStart(2,'0');
  const s = String(timerSec % 60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
  if (timerSec >= 3600)      timerEl.style.color = '#ef4444';
  else if (timerSec >= 2700) timerEl.style.color = '#f97316';
  else                       timerEl.style.color = '#f59e0b';
}, 1000);

document.getElementById('btn-pause').addEventListener('click', () => {
  timerRunning = !timerRunning;
  document.getElementById('btn-pause').textContent = timerRunning ? '⏸' : '▶';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  timerSec = 0; timerRunning = true;
  timerEl.style.color = '#f59e0b';
  timerEl.textContent = '00:00';
  document.getElementById('btn-pause').textContent = '⏸';
});

try {
  const saved = localStorage.getItem('cc_pres_slide');
  if (saved !== null) current = parseInt(saved) || 0;
} catch(e) {}

goTo(current, false);

document.getElementById('slide-frame').addEventListener('load', () => {
  const frame = document.getElementById('slide-frame');
  if (frame && frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'cc_goto', idx: current }, '*');
  }
});
</script>
</body>
</html>
