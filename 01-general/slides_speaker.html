<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사 화면 — AI 에이전트와 바이브 코딩</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 상단 바 ── */
  #top-bar {
    height: 44px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
    flex-shrink: 0;
  }

  #top-bar .label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }

  #top-bar .sep { color: #2a2a2a; }

  #top-bar .slide-info {
    font-size: 12px;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #top-bar .slide-info strong { color: #ccc; }

  #timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #timer {
    font-size: 18px;
    font-weight: 700;
    color: #f59e0b;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    cursor: pointer;
    min-width: 56px;
  }

  #timer:hover { color: #fbbf24; }

  .timer-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .timer-btn:hover { color: #aaa; }

  /* ── 콘텐츠 영역 ── */
  #content {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* ── 좌측: 슬라이드 iframe ── */
  #slide-view {
    flex: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-width: 0;
  }

  #slide-frame-wrap {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.7);
    border: 1px solid #2a2a2a;
    position: relative;
  }

  #slide-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── 우측 패널 ── */
  #right-panel {
    width: 340px;
    min-width: 300px;
    background: #0d0d0d;
    border-left: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 다음 슬라이드 */
  #next-section {
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  #next-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  #next-card .n-idx {
    font-size: 11px;
    color: #444;
    font-weight: 700;
    padding-top: 1px;
    min-width: 24px;
    font-variant-numeric: tabular-nums;
  }

  #next-card .n-body {}

  #next-card .n-section {
    font-size: 10px;
    color: #555;
    margin-bottom: 2px;
  }

  #next-card .n-title {
    font-size: 13px;
    font-weight: 600;
    color: #999;
    line-height: 1.4;
    word-break: keep-all;
  }

  /* 노트 영역 */
  #notes-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .notes-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 16px;
    overflow: hidden;
    border-bottom: 1px solid #181818;
    min-height: 0;
  }

  .notes-block:last-child { border-bottom: none; }

  .notes-block-label {
    font-size: 10px;
    font-weight: 700;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .notes-block-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e1e1e;
  }

  .notes-content {
    font-size: 13px;
    color: #aaa;
    line-height: 1.8;
    word-break: keep-all;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .notes-content::-webkit-scrollbar { width: 4px; }
  .notes-content::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  .notes-content strong { color: #e0e0e0; font-weight: 600; }

  /* ── 하단 네비게이션 ── */
  #bottom-bar {
    height: 52px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    padding: 7px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .nav-btn:hover { background: #252525; color: #f0f0f0; border-color: #444; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn:disabled:hover { background: #1a1a1a; color: #999; border-color: #2a2a2a; }

  .nav-btn.primary { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .nav-btn.primary:hover { background: #fbbf24; border-color: #fbbf24; }
  .nav-btn.primary:disabled { background: #1a1a1a; border-color: #2a2a2a; color: #999; }

  #progress-wrap {
    flex: 1;
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: #f59e0b;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  #counter {
    font-size: 12px;
    color: #444;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #sync-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #333;
    white-space: nowrap;
  }

  #sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #sync-dot.syncing { animation: blink 0.5s 3; }
</style>
</head>
<body>

<!-- 상단 바 -->
<div id="top-bar">
  <span class="label">강사 화면</span>
  <span class="sep">|</span>
  <span class="slide-info" id="header-info"><strong>—</strong></span>
  <div id="timer-wrap">
    <button class="timer-btn" id="btn-pause" title="일시정지">⏸</button>
    <button class="timer-btn" id="btn-reset" title="리셋">↺</button>
    <span id="timer">00:00</span>
  </div>
</div>

<!-- 메인 콘텐츠 -->
<div id="content">

  <!-- 좌측: 슬라이드 임베드 -->
  <div id="slide-view">
    <div id="slide-frame-wrap">
      <iframe id="slide-frame" src="slides.html?embed=1" title="슬라이드"></iframe>
    </div>
  </div>

  <!-- 우측: 다음 슬라이드 + 노트 -->
  <div id="right-panel">

    <div id="next-section">
      <div class="section-label">다음 슬라이드</div>
      <div id="next-card">
        <div class="n-idx" id="next-idx">—</div>
        <div class="n-body">
          <div class="n-section" id="next-section-name">—</div>
          <div class="n-title" id="next-title">마지막 슬라이드입니다</div>
        </div>
      </div>
    </div>

    <div id="notes-section">
      <div class="notes-block">
        <div class="notes-block-label">요약</div>
        <div class="notes-content" id="notes-summary">—</div>
      </div>
      <div class="notes-block">
        <div class="notes-block-label">스크립트</div>
        <div class="notes-content" id="notes-script">—</div>
      </div>
    </div>

  </div>
</div>

<!-- 하단 네비게이션 -->
<div id="bottom-bar">
  <button class="nav-btn" id="btn-prev">← 이전</button>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <span id="counter">1 / 23</span>
  <button class="nav-btn primary" id="btn-next">다음 →</button>
  <div id="sync-status"><div id="sync-dot"></div><span>동기화</span></div>
</div>

  },
  {

  },

    document.getElementById('next-idx').textContent = '—';
    document.getElementById('next-section-name').textContent = '';
    document.getElementById('next-title').textContent = '마지막 슬라이드입니다';
  }

  // 노트
  document.getElementById('notes-summary').innerHTML = note.summary || '';
  document.getElementById('notes-script').innerHTML = note.script || '';

  // 카운터, 프로그레스
  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;

  // 버튼
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
}

// ── 슬라이드 이동 ──
function goTo(idx, broadcast = true) {
  if (idx < 0 || idx >= total) return;
  current = idx;
  updateUI();
  if (broadcast) {
    // iframe으로 직접 postMessage (가장 확실한 방법)
    const frame = document.getElementById('slide-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'cc_goto', idx }, '*');
    }
    // 별도 탭으로 열린 slides.html과도 동기화
    try { localStorage.setItem('cc_pres_slide', idx); } catch(e) {}
    // 동기화 점멸 효과
    const dot = document.getElementById('sync-dot');
    dot.classList.remove('syncing');
    void dot.offsetWidth;
    dot.classList.add('syncing');
  }
}

// ── localStorage 동기화 (slides.html → 이 창) ──
window.addEventListener('storage', e => {
  if (e.key === 'cc_pres_slide') {
    const idx = parseInt(e.newValue);
    if (!isNaN(idx) && idx !== current) goTo(idx, false);
  }
});

// ── 네비게이션 버튼 ──
document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

// ── 키보드 ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

// ── 타이머 ──
let timerSec = 0, timerRunning = true;
const timerEl = document.getElementById('timer');

setInterval(() => {
  if (!timerRunning) return;
  timerSec++;
  const m = String(Math.floor(timerSec / 60)).padStart(2,'0');
  const s = String(timerSec % 60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
  if (timerSec >= 3600)      timerEl.style.color = '#ef4444';
  else if (timerSec >= 2700) timerEl.style.color = '#f97316';
  else                       timerEl.style.color = '#f59e0b';
}, 1000);

document.getElementById('btn-pause').addEventListener('click', () => {
  timerRunning = !timerRunning;
  document.getElementById('btn-pause').textContent = timerRunning ? '⏸' : '▶';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  timerSec = 0; timerRunning = true;
  timerEl.style.color = '#f59e0b';
  timerEl.textContent = '00:00';
  document.getElementById('btn-pause').textContent = '⏸';
});

// ── 초기화 ──
try {
  const saved = localStorage.getItem('cc_pres_slide');
  if (saved !== null) current = parseInt(saved) || 0;
} catch(e) {}

// UI는 먼저 갱신, iframe은 로드 완료 후 동기화
goTo(current, false);

document.getElementById('slide-frame').addEventListener('load', () => {
  const frame = document.getElementById('slide-frame');
  if (frame && frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'cc_goto', idx: current }, '*');
  }
});
</script>
</body>
</html>
