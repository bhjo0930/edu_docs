<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>강사 화면 — 바이브 코딩 심화 실습</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', 'Apple SD Gothic Neo', sans-serif;
    background: #0a0a0a;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── 상단 바 ── */
  #top-bar {
    height: 44px;
    background: #111;
    border-bottom: 1px solid #222;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 14px;
    flex-shrink: 0;
  }

  #top-bar .label {
    font-size: 11px;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 700;
  }

  #top-bar .sep { color: #2a2a2a; }

  #top-bar .slide-info {
    font-size: 12px;
    color: #888;
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  #top-bar .slide-info strong { color: #ccc; }

  #timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  #timer {
    font-size: 18px;
    font-weight: 700;
    color: #f59e0b;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.04em;
    cursor: pointer;
    min-width: 56px;
  }

  #timer:hover { color: #fbbf24; }

  .timer-btn {
    background: none;
    border: none;
    color: #444;
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
    transition: color 0.15s;
  }
  .timer-btn:hover { color: #aaa; }

  /* ── 콘텐츠 영역 ── */
  #content {
    flex: 1;
    display: flex;
    overflow: hidden;
    gap: 0;
  }

  /* ── 좌측: 슬라이드 iframe ── */
  #slide-view {
    flex: 1;
    background: #0d0d0d;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    min-width: 0;
  }

  #slide-frame-wrap {
    width: 100%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 4px 32px rgba(0,0,0,0.7);
    border: 1px solid #2a2a2a;
    position: relative;
  }

  #slide-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── 우측 패널 ── */
  #right-panel {
    width: 340px;
    min-width: 300px;
    background: #0d0d0d;
    border-left: 1px solid #1e1e1e;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* 다음 슬라이드 */
  #next-section {
    padding: 14px 16px;
    border-bottom: 1px solid #1a1a1a;
    flex-shrink: 0;
  }

  .section-label {
    font-size: 10px;
    font-weight: 700;
    color: #444;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 8px;
  }

  #next-card {
    background: #141414;
    border: 1px solid #252525;
    border-radius: 6px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
  }

  #next-card .n-idx {
    font-size: 11px;
    color: #444;
    font-weight: 700;
    padding-top: 1px;
    min-width: 24px;
    font-variant-numeric: tabular-nums;
  }

  #next-card .n-body {}

  #next-card .n-section {
    font-size: 10px;
    color: #555;
    margin-bottom: 2px;
  }

  #next-card .n-title {
    font-size: 13px;
    font-weight: 600;
    color: #999;
    line-height: 1.4;
    word-break: keep-all;
  }

  /* 노트 영역 */
  #notes-section {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .notes-block {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 14px 16px;
    overflow: hidden;
    border-bottom: 1px solid #181818;
    min-height: 0;
  }

  .notes-block:last-child { border-bottom: none; }

  .notes-block-label {
    font-size: 10px;
    font-weight: 700;
    color: #f59e0b;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .notes-block-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: #1e1e1e;
  }

  .notes-content {
    font-size: 13px;
    color: #aaa;
    line-height: 1.8;
    word-break: keep-all;
    overflow-y: auto;
    flex: 1;
    min-height: 0;
  }

  .notes-content::-webkit-scrollbar { width: 4px; }
  .notes-content::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 2px; }
  .notes-content strong { color: #e0e0e0; font-weight: 600; }

  /* ── 하단 네비게이션 ── */
  #bottom-bar {
    height: 52px;
    background: #111;
    border-top: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 12px;
    flex-shrink: 0;
  }

  .nav-btn {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    color: #999;
    padding: 7px 20px;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: inherit;
    white-space: nowrap;
  }

  .nav-btn:hover { background: #252525; color: #f0f0f0; border-color: #444; }
  .nav-btn:disabled { opacity: 0.25; cursor: default; }
  .nav-btn:disabled:hover { background: #1a1a1a; color: #999; border-color: #2a2a2a; }

  .nav-btn.primary { background: #f59e0b; border-color: #f59e0b; color: #000; }
  .nav-btn.primary:hover { background: #fbbf24; border-color: #fbbf24; }
  .nav-btn.primary:disabled { background: #1a1a1a; border-color: #2a2a2a; color: #999; }

  #progress-wrap {
    flex: 1;
    height: 3px;
    background: #1e1e1e;
    border-radius: 2px;
    overflow: hidden;
  }

  #progress-bar {
    height: 100%;
    background: #f59e0b;
    border-radius: 2px;
    transition: width 0.3s;
    width: 0%;
  }

  #counter {
    font-size: 12px;
    color: #444;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }

  #sync-status {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    color: #333;
    white-space: nowrap;
  }

  #sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #sync-dot.syncing { animation: blink 0.5s 3; }
</style>
</head>
<body>

<!-- 상단 바 -->
<div id="top-bar">
  <span class="label">강사 화면</span>
  <span class="sep">|</span>
  <span class="slide-info" id="header-info"><strong>—</strong></span>
  <div id="timer-wrap">
    <button class="timer-btn" id="btn-pause" title="일시정지">⏸</button>
    <button class="timer-btn" id="btn-reset" title="리셋">↺</button>
    <span id="timer">00:00</span>
  </div>
</div>

<!-- 메인 콘텐츠 -->
<div id="content">

  <!-- 좌측: 슬라이드 임베드 -->
  <div id="slide-view">
    <div id="slide-frame-wrap">
      <iframe id="slide-frame" src="practice_adv.html?embed=1" title="슬라이드"></iframe>
    </div>
  </div>

  <!-- 우측: 다음 슬라이드 + 노트 -->
  <div id="right-panel">

    <div id="next-section">
      <div class="section-label">다음 슬라이드</div>
      <div id="next-card">
        <div class="n-idx" id="next-idx">—</div>
        <div class="n-body">
          <div class="n-section" id="next-section-name">—</div>
          <div class="n-title" id="next-title">마지막 슬라이드입니다</div>
        </div>
      </div>
    </div>

    <div id="notes-section">
      <div class="notes-block">
        <div class="notes-block-label">요약</div>
        <div class="notes-content" id="notes-summary">—</div>
      </div>
      <div class="notes-block">
        <div class="notes-block-label">스크립트</div>
        <div class="notes-content" id="notes-script">—</div>
      </div>
    </div>

  </div>
</div>

<!-- 하단 네비게이션 -->
<div id="bottom-bar">
  <button class="nav-btn" id="btn-prev">← 이전</button>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <span id="counter">1 / 30</span>
  <button class="nav-btn primary" id="btn-next">다음 →</button>
  <div id="sync-status"><div id="sync-dot"></div><span>동기화</span></div>
</div>

<script>
// ── 슬라이드 메타 ──
const slides = [
  { title: '바이브 코딩 심화 실습', section: '표지' },

  { title: 'MCP란? AI의 USB 포트', section: '2부' },

  { title: 'Supabase MCP — AI가 DB를 직접 다룬다', section: '2부' },
  { title: '즉시 실습: Supabase MCP 연결 따라하기', section: '2부 실습' },
  { title: '3부: Skills', section: '섹션', isDivider: true },
  { title: 'Skills란? 구조와 작동 방식', section: '3부' },
  { title: 'Skills 실습 — 직접 만들기', section: '3부' },
  { title: '4부: Agent Team', section: '섹션', isDivider: true },
  { title: 'Agent Team이란? 왜 팀인가?', section: '4부' },
  { title: '오케스트레이션 3가지 패턴', section: '4부' },
  { title: 'Agent Team 실습 시나리오', section: '4부' },
  { title: '즉시 실습: 내 Agent Team 설계하기', section: '4부 실습' },
  { title: '5부: 서비스 만들기 & 발표', section: '섹션', isDivider: true },
  { title: '서비스 기획 프레임워크', section: '5부' },
  { title: '나의 서비스 기획 워크시트', section: '5부 실습' },
  { title: '구현 가이드 & 체크리스트', section: '5부' },
  { title: '30분 구현 타임박스', section: '5부 실습' },
  { title: '발표 구성 & 평가 기준', section: '5부' },
  { title: '발표 스크립트 템플릿', section: '5부 실습' },
  { title: '마무리', section: '마무리' },
];

const total = slides.length;

// ── 노트 데이터 ──
const notesData = [
  // 0: 커버
  {
    summary: "바이브 코딩 심화 실습 시작. 대상: Lovable·AI Studio 사용 경험 있음, Claude Code 기초 수준. 5개 파트 (컨텍스트 관리 → MCP → Skills → Agent Team → 서비스 만들기).",
    script: "안녕하세요, 바이브 코딩 심화 실습에 오신 것을 환영합니다.\n\n기초 실습에서 AI 도구를 처음 접하셨다면, 오늘은 한 단계 더 나아가 Claude Code를 중심으로 실무에서 바로 쓸 수 있는 심화 기법들을 익혀봅니다.\n\n오늘 목표는 하나입니다. 실습이 끝날 때 '내 업무에 적용할 것' 하나를 정해서 가져가는 것입니다."
  },
  // 1: 심화 실습 전체 흐름
  {
    summary: "5파트 구성: 1부 컨텍스트 관리(트랜드) / 2부 MCP / 3부 Skills / 4부 Agent Team / 5부 서비스 만들기 & 발표. 각 파트 끝에 30분 실습 있음.",
    script: "오늘 심화 실습의 전체 흐름입니다.\n\n1부에서는 2025년 바이브 코딩 트랜드와 컨텍스트 관리 전략을 다룹니다. AI를 오래, 잘 쓰려면 컨텍스트 관리가 핵심입니다.\n\n2부 MCP는 AI가 외부 도구—데이터베이스, API—와 연결되는 방식입니다. Supabase를 직접 연결해봅니다.\n\n3부 Skills는 반복 업무를 재사용 가능한 명령으로 만드는 방법입니다. 나만의 슬래시 커맨드를 만들어봅니다.\n\n4부 Agent Team은 여러 AI가 팀처럼 협업하는 구조입니다. 오케스트레이션 패턴을 실습합니다.\n\n5부는 오늘 배운 것을 하나로 합쳐서 실제 서비스를 30분 안에 만들고 발표하는 것입니다.\n\n각 파트 끝에 즉시 실습이 있습니다. 설명을 듣고 바로 손을 움직여보세요."
  },
  // 2: 섹션1 divider
  {
    summary: "1부 시작. 2025년 바이브 코딩 트랜드 — 컨텍스트 관리부터 자동화 프레임워크까지.",
    script: "1부를 시작합니다.\n\n2025년 바이브 코딩은 단순히 AI에게 코드를 짜달라는 수준을 넘어, AI를 어떻게 '잘 지시하고 관리하느냐'로 진화했습니다. 그 핵심이 컨텍스트 관리입니다.\n\n그리고 AI 에이전트가 실제 회사처럼 운영되는 사례들이 등장하고 있습니다. 오늘 소개할 OpenClaw, Harness, Paperclip이 그 예입니다."
  },
  // 3: 컨텍스트 관리 전략
  {
    summary: "컨텍스트 = AI의 기억 범위. Claude 약 200K 토큰. 핵심 3가지: CLAUDE.md로 규칙 상시 로드, /clear로 노이즈 제거, compact summary로 압축. 컨텍스트 '품질'이 결과 품질 결정.",
    script: "컨텍스트 관리 전략입니다.\n\n컨텍스트는 AI가 한 세션에서 기억할 수 있는 전체 대화와 코드, 문서의 양입니다. Claude는 약 200K 토큰 — 약 15만 단어를 한 번에 볼 수 있습니다. 방대하지만 무한하지 않습니다.\n\n세 가지 원칙을 기억하세요.\n\n첫째, CLAUDE.md입니다. 프로젝트 목적, 기술 스택, 금지 사항을 적어두면 매 세션 자동으로 로드됩니다. Claude Code를 열 때마다 이 파일을 읽습니다.\n\n둘째, /clear입니다. 작업이 길어져서 AI가 이상한 답을 하기 시작하면, /clear로 이전 대화를 정리하고 새로 시작합니다.\n\n셋째, compact summary입니다. 긴 작업 중간에 '지금까지 완성된 것과 다음 할 것'을 요약해서 새 세션에 붙여넣으면 컨텍스트를 신선하게 유지할 수 있습니다.\n\n핵심은 '많이 넣는 것'보다 '정확하게 넣는 것'입니다."
  },
  // 4: Context Rot
  {
    summary: "Context Rot: 대화가 길수록 AI 추론 품질 저하. 증상: 규칙 위반, 같은 실수 반복, 답변 일반화. 대응: /clear 후 핵심만 요약 붙여넣기 / 작업 단위 분리.",
    script: "Context Rot입니다. 직역하면 컨텍스트 부패입니다.\n\n경험해보신 분 계실 겁니다. 처음엔 날카롭게 잘 답하던 AI가 대화가 길어지면서 점점 이상한 답을 하기 시작하는 현상입니다.\n\n증상을 보시면 — 앞서 정한 규칙을 갑자기 어기거나, 같은 실수가 반복되거나, 답변이 점점 일반적이고 두루뭉술해집니다.\n\n왜 그럴까요? 토큰 한계에 가까워질수록 초기 지시가 희석됩니다. 에러 메시지와 반복 수정이 쌓이면서 노이즈가 증가합니다. 모델이 최근 대화에 더 가중치를 두기 때문입니다.\n\n대응 방법은 두 가지입니다. 첫째, 세션 리셋입니다. /clear 후 '지금까지 완성된 것: ..., 다음 할 것: ...'만 간결하게 붙여넣고 다시 시작합니다.\n\n둘째, 작업 단위 분리입니다. 큰 작업을 독립적인 서브태스크로 쪼개서 각 태스크를 새 세션에서 처리합니다. 각 세션의 컨텍스트를 항상 신선하게 유지하는 것이 목표입니다."
  },
  // 5: OpenClaw

// ── 상태 ──
let current = 0;

// ── UI 업데이트 ──
function updateUI() {
  const s = slides[current];
  const note = notesData[current] || {};
  const next = slides[current + 1];

  // 상단 정보
  document.getElementById('header-info').innerHTML =
    `<strong>${String(current + 1).padStart(2,'0')} / ${total}</strong> — ${s.title} <span style="color:#555">(${s.section})</span>`;

  // 다음 슬라이드
  if (next) {
    document.getElementById('next-idx').textContent = String(current + 2).padStart(2,'0');
    document.getElementById('next-section-name').textContent = next.section;
    document.getElementById('next-title').textContent = next.title;
  } else {
    document.getElementById('next-idx').textContent = '—';
    document.getElementById('next-section-name').textContent = '';
    document.getElementById('next-title').textContent = '마지막 슬라이드입니다';
  }

  // 노트
  document.getElementById('notes-summary').innerHTML = note.summary || '';
  document.getElementById('notes-script').innerHTML = note.script || '';

  // 카운터, 프로그레스
  document.getElementById('counter').textContent = `${current + 1} / ${total}`;
  document.getElementById('progress-bar').style.width = `${((current + 1) / total) * 100}%`;

  // 버튼
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').disabled = current === total - 1;
}

// ── 슬라이드 이동 ──
function goTo(idx, broadcast = true) {
  if (idx < 0 || idx >= total) return;
  current = idx;
  updateUI();
  if (broadcast) {
    const frame = document.getElementById('slide-frame');
    if (frame && frame.contentWindow) {
      frame.contentWindow.postMessage({ type: 'cc_goto', idx }, '*');
    }
    try { localStorage.setItem('cc_pres_slide', idx); } catch(e) {}
    const dot = document.getElementById('sync-dot');
    dot.classList.remove('syncing');
    void dot.offsetWidth;
    dot.classList.add('syncing');
  }
}

// ── localStorage 동기화 ──
window.addEventListener('storage', e => {
  if (e.key === 'cc_pres_slide') {
    const idx = parseInt(e.newValue);
    if (!isNaN(idx) && idx !== current) goTo(idx, false);
  }
});

// ── 네비게이션 버튼 ──
document.getElementById('btn-prev').addEventListener('click', () => goTo(current - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(current + 1));

// ── 키보드 ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') goTo(current + 1);
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   goTo(current - 1);
});

// ── 타이머 ──
let timerSec = 0, timerRunning = true;
const timerEl = document.getElementById('timer');

setInterval(() => {
  if (!timerRunning) return;
  timerSec++;
  const m = String(Math.floor(timerSec / 60)).padStart(2,'0');
  const s = String(timerSec % 60).padStart(2,'0');
  timerEl.textContent = `${m}:${s}`;
  if (timerSec >= 3600)      timerEl.style.color = '#ef4444';
  else if (timerSec >= 2700) timerEl.style.color = '#f97316';
  else                       timerEl.style.color = '#f59e0b';
}, 1000);

document.getElementById('btn-pause').addEventListener('click', () => {
  timerRunning = !timerRunning;
  document.getElementById('btn-pause').textContent = timerRunning ? '⏸' : '▶';
});

document.getElementById('btn-reset').addEventListener('click', () => {
  timerSec = 0; timerRunning = true;
  timerEl.style.color = '#f59e0b';
  timerEl.textContent = '00:00';
  document.getElementById('btn-pause').textContent = '⏸';
});

// ── 초기화 ──
try {
  const saved = localStorage.getItem('cc_pres_slide');
  if (saved !== null) current = parseInt(saved) || 0;
} catch(e) {}

goTo(current, false);

document.getElementById('slide-frame').addEventListener('load', () => {
  const frame = document.getElementById('slide-frame');
  if (frame && frame.contentWindow) {
    frame.contentWindow.postMessage({ type: 'cc_goto', idx: current }, '*');
  }
});
</script>
</body>
</html>
